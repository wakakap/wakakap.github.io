<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" type="text/css" href="css/style.css">
	<title>MyhomePage</title>
</head>
<script src="js/play_daybreak_frontlinev2.js"></script>
<body style="background-color: transparent;">
    <div class="center">
        <audio id="myAudio" src="media/daybreak frontline.mp3"></audio>
    </div>
    <div class="center"><canvas id="canvas" width="112px" height="112px" style="background-color: transparent;"></canvas><br></div>
    <div class="center">
        <button onclick="play()" style="background: transparent; color: white; padding: 10px 20px; border: 2px solid white; border-radius: 50px; font-size: 16px; transition: all 0.3s ease-in-out;">播放</button>
        <button onclick="pause()" style="background: transparent; color: white; padding: 10px 20px; border: 2px solid white; border-radius: 50px; font-size: 16px; transition: all 0.3s ease-in-out;">暂停</button>
        <button onclick="reset()" style="background: transparent; color: white; padding: 10px 20px; border: 2px solid white; border-radius: 50px; font-size: 16px; transition: all 0.3s ease-in-out;">重置</button>
    </div>

</body>
</html>
